<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Metronome</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #121212;
            --bg-panel: #1e1e24;
            --bg-screen: #0d0d10;
            --neon-blue: #00f3ff;
            --neon-pink: #bc13fe;
            --neon-green: #0aff00;
            --neon-red: #ff003c;
            --neon-yellow: #f1c40f;
            --text-main: #e0e0e0;
            --shadow-light: rgba(255,255,255,0.05);
            --shadow-dark: rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 15px; 
            box-sizing: border-box;
            overflow: hidden; 
            /* Tambahan CSS untuk mencegah zoom ganda di beberapa browser mobile */
            touch-action: pan-x pan-y;
        }

        .device-case {
            background: var(--bg-panel);
            padding: 20px 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 100%; 
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.8),
                inset 0 1px 1px var(--shadow-light),
                inset 0 0 0 2px #2a2a30;
            border-top: 1px solid #333;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            margin: 0 0 15px 0;
            color: var(--neon-blue);
            text-transform: uppercase;
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
            flex-shrink: 0;
        }

        /* --- TABS SYSTEM --- */
        .tabs-container {
            display: flex;
            margin-bottom: 12px;
            background: #151518;
            border-radius: 8px;
            border: 1px solid #333;
            overflow: hidden;
            flex-shrink: 0;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            color: #888;
            border: none;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: #25252b;
            color: var(--neon-blue);
            box-shadow: inset 0 -3px 0 var(--neon-blue);
        }
        
        .tab-content {
            display: none;
            flex-direction: column;
            flex: 1; 
            min-height: 0; 
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: flex;
        }

        #mainTab > div {
            flex-shrink: 0; 
        }

        .screen-panel {
            background: var(--bg-screen);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            border: 2px solid #333;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60px;
        }

        .beat-indicator {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        .dot {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
            transition: all 0.05s;
            border: 1px solid #444;
            cursor: pointer; 
        }
        
        .dot.state-tik { background-color: #3a0d1d; border-color: #6a1b38; }
        .dot.state-tok { background-color: #0d283a; border-color: #1b4a6a; }
        .dot.state-mute { background-color: #151515; border-color: #2a2a2a; }

        .dot.active-tik { 
            background-color: var(--neon-pink); 
            box-shadow: 0 0 15px var(--neon-pink), 0 0 30px var(--neon-pink);
            border-color: #fff;
            transform: scale(1.1);
        }
        .dot.active-tok { 
            background-color: var(--neon-blue); 
            box-shadow: 0 0 15px var(--neon-blue), 0 0 30px var(--neon-blue);
            border-color: #fff;
            transform: scale(1.1);
        }
        .dot.active-mute { 
            background-color: #444; 
            box-shadow: 0 0 5px #444;
            border-color: #888;
            transform: scale(1.05);
        }

        #playbackStatus {
            display: none;
            color: var(--neon-yellow);
            font-family: 'Orbitron', monospace;
            text-align: center;
            font-size: 0.85rem;
            margin-top: 10px;
            animation: flicker 2s infinite;
        }

        /* --- CONTROLS AREA --- */
        .controls-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            margin-bottom: 12px;
            background: #25252b;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 5px;
            font-weight: bold;
            text-align: center;
        }

        .tempo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        
        .tweak-row {
            display: flex;
            gap: 10px;
            margin: 4px 0;
        }

        .tempo-tweak {
            background: #1a1a1f;
            border: 1px solid #444;
            color: var(--neon-blue);
            border-radius: 4px;
            padding: 3px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: 0.2s;
        }

        .tempo-tweak:hover { background: #333; }
        .tempo-tweak:active { background: var(--neon-blue); color: black; }
        .tempo-tweak:disabled { opacity: 0.3; cursor: not-allowed; }

        .bpm-input {
            background: transparent;
            border: none;
            color: var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            text-align: center;
            width: 90px;
            outline: none;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
            margin: 2px 0;
        }
        .bpm-input::-webkit-outer-spin-button,
        .bpm-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .bpm-input:disabled { opacity: 0.7; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #111;
            border-radius: 3px;
            outline: none;
            margin-top: 8px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--neon-blue);
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-blue);
            border: 2px solid #fff;
        }

        select {
            background: #111;
            color: var(--neon-blue);
            border: 1px solid #444;
            padding: 8px;
            border-radius: 5px;
            font-family: 'Orbitron', monospace;
            outline: none;
            font-size: 1.1rem;
            text-align: center;
        }
        select:disabled { opacity: 0.5; }

        /* --- TRANSPORT BUTTONS --- */
        .transport-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
        }

        .btn-main, .btn-rec {
            flex: 1;
            padding: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 0.95rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
            background: linear-gradient(145deg, #2a2a2a, #323232);
            box-shadow: 5px 5px 10px #151515, -5px -5px 10px #353535;
            color: #fff;
        }

        .btn-main:active, .btn-rec:active {
            box-shadow: inset 5px 5px 10px #151515, inset -5px -5px 10px #353535;
        }

        .btn-main[data-active="true"] {
            background: #2980b9;
            box-shadow: 0 0 15px #2980b9;
            text-shadow: 0 0 5px #fff;
        }
        
        .btn-rec.recording {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 20px var(--neon-red);
            animation: pulse-red 1s infinite;
        }

        /* --- PADS GRID --- */
        .pad-container { margin-bottom: 0px; }
        
        .section-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .btn-section, .btn-stop {
            position: relative; 
            border: none;
            border-radius: 6px;
            padding: 12px 5px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            color: rgba(255,255,255,0.7);
            background: #25252b;
            box-shadow: 0 4px 0 #15151a, 0 5px 10px rgba(0,0,0,0.5); 
            transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .shortcut {
            position: absolute;
            top: 4px;
            right: 6px;
            font-size: 0.55rem;
            color: rgba(255,255,255,0.4);
            font-family: 'Roboto', sans-serif;
            pointer-events: none;
            background: rgba(0,0,0,0.3);
            padding: 2px 4px;
            border-radius: 3px;
        }
        .btn-main .shortcut {
            top: auto;
            bottom: 3px;
            right: 8px;
            font-size: 0.55rem;
            background: none;
        }

        .btn-section:active, .btn-stop:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #15151a, inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .btn-section.queued {
            background: var(--neon-yellow);
            color: black;
            box-shadow: 0 0 15px var(--neon-yellow);
            transform: translateY(2px);
            animation: blink-yellow 0.5s infinite alternate;
        }
        .btn-section.queued .shortcut { color: rgba(0,0,0,0.6); }

        .btn-stop {
            grid-column: span 3;
            background: #3a1c1c;
            color: var(--neon-red);
            border: 1px solid var(--neon-red);
            margin-top: 2px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
        }
        .btn-stop:hover {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 20px var(--neon-red);
        }
        .btn-stop.queued {
            background: var(--neon-red) !important;
            color: white !important;
            animation: pulse-red 0.2s infinite;
        }
        .btn-stop .shortcut { font-size: 0.65rem; top: 12px; right: 15px; }

        /* PRESET LIBRARY */
        .preset-area {
            background: #151518;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #333;
            flex: 1; 
            overflow-y: auto; 
        }
        
        .preset-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #222;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 8px;
            border-left: 3px solid #444;
            transition: 0.2s;
        }
        .preset-item:hover {
            border-left-color: var(--neon-blue);
            background: #2a2a2a;
        }

        .preset-info strong { color: #fff; font-size: 0.9rem; }
        .preset-info small { color: #777; font-size: 0.75rem; font-family: 'Orbitron', monospace; }

        .preset-controls button {
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px;
            transition: 0.2s;
        }
        .preset-play { color: var(--neon-green); }
        .preset-play:hover { text-shadow: 0 0 10px var(--neon-green); transform: scale(1.1); }
        .preset-del { color: #555; }
        .preset-del:hover { color: var(--neon-red); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        /* --- RESPONSIVE CSS --- */
        @media (max-height: 750px) {
            .device-case { padding: 15px 20px; }
            h1 { margin-bottom: 10px; font-size: 1.2rem; }
            .tabs-container { margin-bottom: 10px; }
            .screen-panel, .controls-wrapper, .transport-bar { margin-bottom: 10px; }
            .btn-section { padding: 10px 5px; font-size: 0.75rem;}
        }

        @media (max-height: 600px) {
            .device-case { padding: 10px; }
            h1 { font-size: 1.1rem; }
            .screen-panel { padding: 10px; min-height: 40px; }
            .controls-wrapper { padding: 8px; margin-bottom: 8px;}
            .bpm-input { font-size: 1.5rem; width: 70px; }
            .tempo-tweak { padding: 2px 8px; font-size: 0.7rem; }
            .btn-main, .btn-rec { padding: 10px; font-size: 0.85rem;}
            .section-grid { gap: 6px; }
            .transport-bar { margin-bottom: 8px; }
        }
        
        @media (max-width: 480px) {
            .shortcut { font-size: 0.5rem; top: 2px; right: 4px; }
            .bpm-input { width: 80px; }
        }

        @keyframes flicker {
            0% { opacity: 1; }
            3% { opacity: 0.4; }
            6% { opacity: 1; }
            100% { opacity: 1; }
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 10px var(--neon-red); }
            50% { box-shadow: 0 0 25px var(--neon-red); }
            100% { box-shadow: 0 0 10px var(--neon-red); }
        }
        @keyframes blink-yellow {
            from { opacity: 1; }
            to { opacity: 0.6; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="device-case">
        <h1>Smart Metronome</h1>

        <div class="tabs-container">
            <button class="tab-btn active" id="tabMainBtn" onclick="switchTab('main')">CONTROLS</button>
            <button class="tab-btn" id="tabPresetBtn" onclick="switchTab('presets')">LIBRARY</button>
        </div>

        <div id="mainTab" class="tab-content active">
            <div class="screen-panel">
                <div class="beat-indicator" id="dotsContainer"></div>
                <div id="playbackStatus">PLAYING: PRESET NAME</div>
            </div>

            <div class="controls-wrapper">
                <div class="control-group" style="width: 60%;">
                    <label>Tempo (BPM)</label>
                    <div class="tempo-area">
                        <div class="tweak-row">
                            <button class="tempo-tweak" onclick="adjustTempo(1)">+1</button>
                            <button class="tempo-tweak" onclick="adjustTempo(5)">+5</button>
                        </div>
                        
                        <input type="number" class="bpm-input" id="tempoInput" value="120" min="40" max="240">
                        
                        <div class="tweak-row">
                            <button class="tempo-tweak" onclick="adjustTempo(-1)">-1</button>
                            <button class="tempo-tweak" onclick="adjustTempo(-5)">-5</button>
                        </div>
                    </div>
                    
                    <input type="range" id="tempoSlider" min="40" max="240" value="120">
                </div>
                
                <div class="control-group" style="width: 35%; align-items: center;">
                    <label>Signature</label>
                    <select id="timeSignature">
                        <option value="4">4/4</option>
                        <option value="3">3/4</option>
                        <option value="2">2/4</option>
                        <option value="1">1/4</option>
                    </select>
                </div>
            </div>

            <div class="transport-bar">
                <button class="btn-main" id="toggleBtn">START <span class="shortcut">[SPACE]</span></button>
                <button class="btn-rec" id="recordBtn">● REC</button>
            </div>
            
            <div class="pad-container">
                <div class="section-grid">
                    <button class="btn-section" onclick="queueSection('Prelude')">Prelude <span class="shortcut">Q</span></button>
                    <button class="btn-section" onclick="queueSection('Intro')">Intro <span class="shortcut">W</span></button>
                    <button class="btn-section" onclick="queueSection('Pre-Chorus')">Pre-Chorus <span class="shortcut">E</span></button>
                    
                    <button class="btn-section" onclick="queueSection('Verse 1')">Verse 1 <span class="shortcut">R</span></button>
                    <button class="btn-section" onclick="queueSection('Verse 2')">Verse 2 <span class="shortcut">T</span></button>
                    <button class="btn-section" onclick="queueSection('Verse 3')">Verse 3 <span class="shortcut">Y</span></button>
                    
                    <button class="btn-section" onclick="queueSection('Verse 4')">Verse 4 <span class="shortcut">U</span></button>
                    <button class="btn-section" onclick="queueSection('Verse 5')">Verse 5 <span class="shortcut">I</span></button>
                    <button class="btn-section" onclick="queueSection('Chorus')">Chorus <span class="shortcut">O</span></button>
                    
                    <button class="btn-section" onclick="queueSection('Interlude')">Interlude <span class="shortcut">P</span></button>
                    <button class="btn-section" onclick="queueSection('Bridge')">Bridge <span class="shortcut">A</span></button>
                    <button class="btn-section" onclick="queueSection('Ending')">Ending <span class="shortcut">S</span></button>

                    <button class="btn-stop" onclick="queueSection('Stop')">STOP / FINISH <span class="shortcut">D</span></button>
                </div>
            </div>
        </div>

        <div id="presetsTab" class="tab-content">
            <div class="preset-area">
                <div id="presetList"></div>
            </div>
        </div>
    </div>

<script>
    // --- PREVENT ZOOM (PINCH & KEYBOARD) ---
    // Mencegah zoom menggunakan ctrl + scroll / pinch di trackpad komputer
    document.addEventListener('wheel', function(e) {
        if (e.ctrlKey) {
            e.preventDefault();
        }
    }, { passive: false });

    // Mencegah zoom menggunakan kombinasi keyboard (Ctrl/Cmd + Plus/Minus/Nol)
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) {
            e.preventDefault();
        }
    });

    // --- TABS LOGIC ---
    window.switchTab = function(tabName) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));

        if(tabName === 'main') {
            document.getElementById('mainTab').classList.add('active');
            document.getElementById('tabMainBtn').classList.add('active');
        } else {
            document.getElementById('presetsTab').classList.add('active');
            document.getElementById('tabPresetBtn').classList.add('active');
        }
    }

    const AudioContext = window.AudioContext || window.webkitAudioContext;

wAJAAkACAAHAAgACQAHAAUABQAIAAoACAAHAAYABwAHAAcABwAIAAkABwAGAAYABwAIAAgABwAGAAcACAAIAAYABQAGAAcABwAHAAcABwAHAAYABgAGAAYABgAGAAcABwAHAAYABgAHAAgABwAGAAYABwAHAAYABwAIAAkACAAHAAYABgAHAAcABgAGAAYABgAGAAYABwAIAAcABgAFAAYABgAGAAYABwAHAAcABgAGAAYABgAGAAUABQAGAAcABgAFAAUABwAJAAkABwAGAAYABgAGAAUABgAIAAgABgAEAAUACAAJAAcABAADAAMABAAGAAcABwAHAAcABgAGAAYABgAFAAQABQAGAAYABQAFAAYABgAEAAIAAwADAAMAAgACAAMAAwADAAMAAwACAAEAAgAEAAQAAgACAAUABQADAAEAAQAEAAMAAAD+////AAABAAEAAQACAAMAAQD///3//f///wAA/v/+/wAAAwADAAAA/////////v/9////AAAAAAAAAAADAAMAAAD9//v/+v/6//r//P/+/////v/+///////9//r/+P/3//r//f8AAAEAAQAAAP7//P/6//j/9P/w//D/9f/6//3//v/9//3//P/6//f/9v/3//n//f////7/+//4//f/9v/1//X/8//z//b/+f/6//n/+P/3//f/9//3//f/9v/0//T/9//6//n/9//2//f/+P/3//b/9f/1//b/9//4//n/+f/3//b/9v/2//T/9P/0//b/+f/7//n/9//3//j/+P/3//f/9//4//n/+//+/wAA///8//n/+P/4//f/+P/5//v//f//////AAD///7//v/+//7//v/9//3/AAABAAEAAAD////////+//z//f///////v8='
    };

    const audioBuffers = {};

    async function loadBase64Samples() {
        for (const [key, base64Str] of Object.entries(base64Audio)) {
            try {
                const response = await fetch(base64Str);
                const arrayBuffer = await response.arrayBuffer();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                audioBuffers[key] = audioBuffer;
            } catch (e) {
                console.error("Failed to load audio sample:", key, e);
            }
        }
    }
    loadBase64Samples();

    let isPlaying = false;
    let isRecording = false;
    let isPlaybackMode = false; 
    
    let tempo = 120;
    let beatsPerBar = 4;
    let currentBeat = 0; 
    let nextNoteTime = 0.0;
    let timerID = null;
    let lookahead = 25.0; 
    let scheduleAheadTime = 0.1; 

    let beatStates = [];
    let targetMeasureCountIn = -1; 
    let pendingStop = false;      
    
    let measureCount = 0; 
    let recordedEvents = []; 
    let currentPlaybackEvents = [];

    const toggleBtn = document.getElementById('toggleBtn');
    const recordBtn = document.getElementById('recordBtn');
    const tempoSlider = document.getElementById('tempoSlider');
    const tempoInput = document.getElementById('tempoInput');
    const signatureSelect = document.getElementById('timeSignature');
    const dotsContainer = document.getElementById('dotsContainer');
    const presetList = document.getElementById('presetList');
    const playbackStatus = document.getElementById('playbackStatus');

    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' && e.target.type !== 'range') return;
        if (e.repeat) return;
        // Jangan eksekusi shortcut jika user menekan tombol modifier (Ctrl/Cmd/Alt/Shift)
        if (e.ctrlKey || e.metaKey || e.altKey) return;

        const key = e.key.toLowerCase();
        
        if (key === 'q') queueSection('Prelude');
        else if (key === 'w') queueSection('Intro');
        else if (key === 'e') queueSection('Pre-Chorus');
        else if (key === 'r') queueSection('Verse 1');
        else if (key === 't') queueSection('Verse 2');
        else if (key === 'y') queueSection('Verse 3');
        else if (key === 'u') queueSection('Verse 4');
        else if (key === 'i') queueSection('Verse 5');
        else if (key === 'o') queueSection('Chorus');
        else if (key === 'p') queueSection('Interlude');
        else if (key === 'a') queueSection('Bridge');
        else if (key === 's') queueSection('Ending');
        else if (key === 'd') queueSection('Stop');
        else if (key === ' ') {
            e.preventDefault(); 
            toggleBtn.click();
        }
    });

    function playSound(freq, time) {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc.frequency.value = freq;
        gainNode.gain.setValueAtTime(1, time);
        gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
        
        osc.start(time);
        osc.stop(time + 0.1);
    }

    function playSample(name, time) {
        if (!audioBuffers[name]) return;
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffers[name];
        source.connect(audioCtx.destination);
        source.start(time);
    }

    function speakText(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'en-US'; 
            msg.rate = 1.8; 
            window.speechSynthesis.speak(msg);
        }
    }

    function nextNote() {
        const secondsPerBeat = 60.0 / tempo;
        nextNoteTime += secondsPerBeat;
        currentBeat++;
        
        if (currentBeat >= beatsPerBar) {
            currentBeat = 0;
            measureCount++;
        }
    }

    function scheduleNote(beatNumber, time) {
        setTimeout(() => updateVisuals(beatNumber), (time - audioCtx.currentTime) * 1000);

        if (isPlaybackMode) {
            const event = currentPlaybackEvents.find(e => e.measure === measureCount && e.beat === beatNumber);
            if (event) {
                speakText(event.cue); 
                targetMeasureCountIn = measureCount + 1;
                if (event.cue === 'Stop') pendingStop = true;
                
                document.querySelectorAll('.btn-section, .btn-stop').forEach(b => b.classList.remove('queued'));
                const buttons = document.querySelectorAll('.btn-section, .btn-stop');
                for (let btn of buttons) {
                    if (btn.innerText.includes(event.cue)) btn.classList.add('queued');
                }
            }
        }

        if (measureCount === targetMeasureCountIn) {
            const count = beatNumber + 1;
            if (count === 1) playSample('one', time);
            else if (count === 2) playSample('two', time);
            else if (count === 3) playSample('three', time);
            else if (count === 4) playSample('four', time);
            
            if (pendingStop && beatNumber === beatsPerBar - 1) {
                setTimeout(() => stopMetronome(), (time - audioCtx.currentTime + 0.15) * 1000);
            }
        }
        else if (measureCount > targetMeasureCountIn && targetMeasureCountIn !== -1) {
            document.querySelectorAll('.btn-section, .btn-stop').forEach(b => b.classList.remove('queued'));
            targetMeasureCountIn = -1;
            pendingStop = false;
        }

        const currentState = beatStates[beatNumber];
        if (currentState === 'tik') playSound(1200, time);
        else if (currentState === 'tok') playSound(600, time);
    }

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
            scheduleNote(currentBeat, nextNoteTime);
            nextNote();
        }
        if (isPlaying) timerID = setTimeout(scheduler, lookahead);
    }

    function updateVisuals(beat) {
        const dots = document.querySelectorAll('.dot');
        dots.forEach((d, i) => d.className = `dot state-${beatStates[i]}`); 
        if (dots[beat]) dots[beat].classList.add(`active-${beatStates[beat]}`);
    }

    function createDots() {
        dotsContainer.innerHTML = '';
        for (let i = 0; i < beatsPerBar; i++) {
            const dot = document.createElement('div');
            dot.className = `dot state-${beatStates[i]}`;
            dot.onclick = () => toggleBeatState(i);
            dotsContainer.appendChild(dot);
        }
    }

    function toggleBeatState(index) {
        const states = ['tik', 'tok', 'mute'];
        let currentState = beatStates[index];
        let nextIndex = (states.indexOf(currentState) + 1) % states.length;
        beatStates[index] = states[nextIndex];
        
        const dots = document.querySelectorAll('.dot');
        if (dots[index]) {
            dots[index].className = `dot state-${beatStates[index]}`;
            if (isPlaying && currentBeat === index) dots[index].classList.add(`active-${beatStates[index]}`);
        }
    }

    function toggleControlState(disabled) {
        tempoSlider.disabled = disabled;
        tempoInput.disabled = disabled;
        signatureSelect.disabled = disabled;
        document.querySelectorAll('.tempo-tweak').forEach(btn => btn.disabled = disabled);
    }

    function startMetronome() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        currentBeat = 0;
        measureCount = 0;
        nextNoteTime = audioCtx.currentTime + 0.1;
        isPlaying = true;
        
        targetMeasureCountIn = -1;
        pendingStop = false;
        
        toggleBtn.innerHTML = "STOP <span class='shortcut'>[SPACE]</span>";
        toggleBtn.style.color = "#ff4757"; 
        
        toggleControlState(true);
        toggleBtn.setAttribute('data-active', 'true');

        scheduler();
    }

    function stopMetronome() {
        isPlaying = false;
        clearTimeout(timerID);
        toggleBtn.innerHTML = "START <span class='shortcut'>[SPACE]</span>";
        toggleBtn.style.color = "white";
        toggleBtn.removeAttribute('data-active');
        
        toggleControlState(false);
        
        const dots = document.querySelectorAll('.dot');
        dots.forEach((d, i) => d.className = `dot state-${beatStates[i]}`);
        
        document.querySelectorAll('.btn-section, .btn-stop').forEach(b => b.classList.remove('queued'));

        if (isRecording) finishRecording();
        
        if (isPlaybackMode) {
            isPlaybackMode = false;
            playbackStatus.style.display = 'none';
        }
    }

    window.queueSection = function(name) {
        if (!isPlaying) return;
        if (isPlaybackMode) return;

        speakText(name);

        if (isRecording) {
            recordedEvents.push({
                measure: measureCount,
                beat: currentBeat,
                cue: name
            });
        }

        targetMeasureCountIn = measureCount + 1;
        if (name === 'Stop') pendingStop = true;

        document.querySelectorAll('.btn-section, .btn-stop').forEach(b => b.classList.remove('queued'));
        const buttons = document.querySelectorAll('.btn-section, .btn-stop');
        for (let btn of buttons) {
            if (btn.innerText.includes(name)) btn.classList.add('queued');
        }
    };

    recordBtn.addEventListener('click', () => {
        if (isPlaybackMode) return;
        if (!isRecording) {
            if (!isPlaying) startMetronome();
            isRecording = true;
            recordedEvents = [];
            recordBtn.classList.add('recording');
        } else {
            queueSection('Stop');
        }
    });

    function finishRecording() {
        isRecording = false;
        recordBtn.classList.remove('recording');

        setTimeout(() => {
            let name = prompt("SAVE PRESET AS:", "Song " + new Date().toLocaleTimeString());
            if (name) savePreset(name);
        }, 200);
    }

    function savePreset(name) {
        const preset = {
            id: Date.now(),
            name: name,
            bpm: tempo,
            signature: beatsPerBar,
            events: recordedEvents,
            beatPattern: [...beatStates]
        };

        let saved = JSON.parse(localStorage.getItem('metronome_presets_v7') || '[]');
        saved.push(preset);
        localStorage.setItem('metronome_presets_v7', JSON.stringify(saved));
        renderPresets();
    }

    function renderPresets() {
        const saved = JSON.parse(localStorage.getItem('metronome_presets_v7') || '[]');
        presetList.innerHTML = '';
        
        if (saved.length === 0) {
            presetList.innerHTML = '<p style="color: #444; text-align:center; font-size:0.8rem; margin-top: 150px;">[ EMPTY LIBRARY ]</p>';
            return;
        }

        saved.forEach(p => {
            const div = document.createElement('div');
            div.className = 'preset-item';
            div.innerHTML = `
                <div class="preset-info">
                    <strong>${p.name}</strong><br>
                    <small>${p.bpm} BPM / ${p.signature}-4</small>
                </div>
                <div class="preset-controls">
                    <button class="preset-play" onclick="playPreset(${p.id})">▶</button>
                    <button class="preset-del" onclick="deletePreset(${p.id})">×</button>
                </div>
            `;
            presetList.appendChild(div);
        });
    }

    window.playPreset = function(id) {
        if (isPlaying) stopMetronome();

        const saved = JSON.parse(localStorage.getItem('metronome_presets_v7') || '[]');
        const preset = saved.find(p => p.id === id);
        
        if (preset) {
            updateTempoUI(preset.bpm);
            beatsPerBar = preset.signature;
            signatureSelect.value = beatsPerBar;
            
            beatStates = preset.beatPattern ? [...preset.beatPattern] : Array.from({length: beatsPerBar}, (_, i) => i === 0 ? 'tik' : 'tok');
            createDots();

            currentPlaybackEvents = preset.events;
            isPlaybackMode = true;
            
            switchTab('main');
            
            playbackStatus.style.display = 'block';
            playbackStatus.innerText = `PLAYING: ${preset.name}`;

            startMetronome();
        }
    };

    window.deletePreset = function(id) {
        if (!confirm("DELETE PRESET?")) return;
        let saved = JSON.parse(localStorage.getItem('metronome_presets_v7') || '[]');
        saved = saved.filter(p => p.id !== id);
        localStorage.setItem('metronome_presets_v7', JSON.stringify(saved));
        renderPresets();
    };

    toggleBtn.addEventListener('click', () => {
        if (isPlaying) stopMetronome();
        else startMetronome();
    });

    /* TEMPO LOGIC */
    function updateTempoUI(val) {
        if (val < 40) val = 40;
        if (val > 240) val = 240;
        tempo = val;
        tempoInput.value = tempo;
        tempoSlider.value = tempo;
    }

    window.adjustTempo = function(amount) {
        if (isPlaying) return;
        updateTempoUI(tempo + amount);
    };

    tempoInput.addEventListener('change', (e) => {
        updateTempoUI(parseInt(e.target.value) || 120);
    });

    tempoSlider.addEventListener('input', (e) => {
        updateTempoUI(parseInt(e.target.value));
    });

    signatureSelect.addEventListener('change', (e) => {
        beatsPerBar = parseInt(e.target.value);
